<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Retenidos</title>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Gloria+Hallelujah&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }

body {
  font-family: "Gloria Hallelujah", "Patrick Hand", cursive;
  color: #1a1a1a;
  background: url("fondo1.png") center center / contain no-repeat fixed;
}

.scene {
  position: relative;
  min-height: 100vh;
  width: 100%;
}

/* ===== BLOQUES ===== */

.note {
  position: absolute;
  text-align: center;
}

/* IZQUIERDA */
.left {
  top: 8%;
  left: 12%;
  width: 22%;
}

/* DERECHA */
.right {
  top: 18%;
  right: 10%;
  width: 30%;
}

/* TEXTOS */
.tiny { font-size: clamp(12px, 2vw, 20px); }
.big { font-size: clamp(40px, 10vw, 100px); font-weight: bold; }
.mid { font-size: clamp(16px, 3vw, 28px); }
.sub { font-size: clamp(12px, 2vw, 18px); }

/* CONTADORES */
.stack {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

.stack > div {
  flex: 1 1 30%;
}

/* FOOTER */
.footer {
  position: absolute;
  bottom: 3%;
  width: 100%;
  text-align: center;
  font-size: 12px;
}

/* ========================= */
/* 📱 MÓVIL VERTICAL (CLAVE) */
/* ========================= */

@media (max-width: 640px) and (orientation: portrait) {

  body {
    background-position: top center;
    background-size: contain;
  }

  .note {
    position: relative;   /* 🔥 CLAVE: quitamos absolute */
    width: 100%;
    left: 0;
    right: 0;
    transform: none;
  }

  .left {
    margin-top: 20px;
  }

  .right {
    margin-top: 20px;
  }

  .big {
    font-size: clamp(24px, 8vw, 40px);
  }

  .stack > div {
    flex: 1 1 45%;
  }
}
</style>
</head>

<body>
<main class="scene">

<!-- IZQUIERDA -->
<section class="note left">
  <div class="tiny">DÍAS</div>
  <div class="big" id="daysSince">--</div>
  <div class="mid">retenidos</div>
  <div class="sub">desde el 1/3/2026</div>
</section>

<!-- DERECHA -->
<section class="note right">
  <div class="stack">
    <div><div class="big" id="weeksLeft">--</div><div class="sub">sem</div></div>
    <div><div class="big" id="daysLeft">--</div><div class="sub">días</div></div>
    <div><div class="big" id="hoursLeft">--</div><div class="sub">h</div></div>
    <div><div class="big" id="minutesLeft">--</div><div class="sub">min</div></div>
    <div><div class="big" id="secondsLeft">--</div><div class="sub">seg</div></div>
  </div>

  <div class="tiny" style="margin-top:10px;">
    si salgo el 1/6/2027
  </div>
</section>

<div class="footer" id="todayText"></div>

</main>

<script>
const MS_PER_DAY = 1000 * 60 * 60 * 24;

function startOfDay(date) {
  return new Date(date.getFullYear(), date.getMonth(), date.getDate());
}

function diffInDays(fromDate, toDate) {
  return Math.round((startOfDay(toDate) - startOfDay(fromDate)) / MS_PER_DAY);
}

function updateCounters() {

  const now = new Date();
  const target = new Date(2027, 5, 1);
  const start = new Date(2026, 2, 1);

  let diff = target - now;
  if (diff < 0) diff = 0;

  const totalSeconds = Math.floor(diff / 1000);

  const weeks = Math.floor(totalSeconds / (7*24*3600));
  const days = Math.floor((totalSeconds % (7*24*3600)) / (24*3600));
  const hours = Math.floor((totalSeconds % (24*3600)) / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;

  const daysSince = Math.max(0, diffInDays(start, now));

  document.getElementById("weeksLeft").textContent = weeks;
  document.getElementById("daysLeft").textContent = days;
  document.getElementById("hoursLeft").textContent = hours;
  document.getElementById("minutesLeft").textContent = minutes;
  document.getElementById("secondsLeft").textContent = seconds;

  document.getElementById("daysSince").textContent = daysSince;

  document.getElementById("todayText").textContent =
    "Actualizado: " + now.toLocaleDateString("es-ES");
}

setInterval(updateCounters, 1000);
updateCounters();
</script>

</body>
</html>
